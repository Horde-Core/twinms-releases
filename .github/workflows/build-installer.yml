name: Build installer

# Builds the full TwinMS client installer and publishes it to THIS repo's Releases
# (the feed electron-updater follows). It combines three things:
#   • twinms-frontend             — checked out + built here (owns the Electron shell + packaging)
#   • backend.zip + db-backup.zip — the newest PRERELEASE published by twinms-backend
#   • Mongo/Node/VC++ binaries     — fetched by the app's setup-local-stack.ps1 -BinariesOnly
#
# Triggers: workflow_dispatch (manual) + repository_dispatch (auto) — fired by a
# twinms-frontend push (frontend-push) or a new twinms-backend release (backend-release).
#
# Required secret (repo or org):
#   ORCHESTRATOR_TOKEN — fine-grained PAT with
#                          • Contents: READ        on Horde-Core/twinms-frontend
#                          • Contents: READ & WRITE on Horde-Core/twinms-releases

on:
  workflow_dispatch:
    inputs:
      frontend_ref:
        description: "twinms-frontend ref to build (branch / tag / SHA)"
        required: false
        default: master
      version:
        description: "Installer version (semver, e.g. 0.5.0). Blank = auto patch-bump."
        required: false
  repository_dispatch:
    types: [frontend-push, backend-release]

concurrency:
  group: build-installer
  cancel-in-progress: false

jobs:
  build:
    # GitHub-hosted Windows. Switch to [self-hosted, windows] to reuse the backend's
    # runner (free minutes + you can cache vendor/ on disk between runs).
    runs-on: windows-latest

    steps:
      - name: Check out twinms-frontend
        uses: actions/checkout@v4
        with:
          repository: Horde-Core/twinms-frontend
          ref: ${{ github.event.inputs.frontend_ref || 'master' }}
          token: ${{ secrets.ORCHESTRATOR_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # node-window-manager (and its dep extract-file-icon) are native addons that
      # compile via node-gyp on install. The hosted runner's automatic Visual Studio
      # detection can fail ("could not find a version of Visual Studio 2017 or newer"),
      # so wire up the build toolchain explicitly before `npm ci`:
      #   • Python 3.12 — node-gyp's gyp scripts (the runner default 3.14 is too new)
      #   • MSVC dev env — exports VCINSTALLDIR so node-gyp uses that compiler directly
      - name: Set up Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSVC toolchain (for native node addons)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download newest backend artifacts (latest prerelease)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
        run: |
          $rels = gh release list --repo Horde-Core/twinms-releases --limit 100 --json tagName,createdAt | ConvertFrom-Json
          # Backend artifacts are tagged release-<timestamp> (marked prerelease so clients ignore them).
          # Pick the NEWEST such release that actually has BOTH assets — a backend run can occasionally
          # publish only one (e.g. a failed snapshot), and we must not try to build from an incomplete one.
          $tag = $null
          foreach ($r in ($rels | Where-Object { $_.tagName -like 'release-*' } | Sort-Object createdAt -Descending)) {
            $names = (gh release view $r.tagName --repo Horde-Core/twinms-releases --json assets | ConvertFrom-Json).assets.name
            if (($names -contains 'backend.zip') -and ($names -contains 'db-backup.zip')) { $tag = $r.tagName; break }
          }
          if (-not $tag) { throw "No release-* with BOTH backend.zip and db-backup.zip found in twinms-releases." }
          Write-Host "Backend artifacts from: $tag"
          gh release download $tag --repo Horde-Core/twinms-releases `
            --pattern backend.zip --pattern db-backup.zip --dir _artifacts --clobber
          if (-not (Test-Path _artifacts\backend.zip) -or -not (Test-Path _artifacts\db-backup.zip)) {
            throw "Expected backend.zip and db-backup.zip in _artifacts after download."
          }

      - name: Unpack backend + snapshot
        shell: pwsh
        run: |
          Expand-Archive _artifacts\backend.zip   -DestinationPath _backend  -Force  # dist + config + package.json (+lock)
          Expand-Archive _artifacts\db-backup.zip -DestinationPath _snapshot -Force  # dump/ + snapshot.version

      - name: Fetch vendor binaries (mongod / mongorestore / node / VC++ DLLs)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\setup-local-stack.ps1 -BinariesOnly

      - name: Install deps + build frontend
        shell: pwsh
        run: |
          npm ci
          npm run build   # next build -> out/

      # Decide the version to publish. A manual workflow_dispatch input wins; otherwise
      # auto patch-bump from the latest published v* release (the very first release
      # falls back to package.json's version). electron-updater needs strictly-increasing
      # semver, so every build gets a fresh, higher version.
      - name: Resolve + stamp version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            $rels = gh release list --repo Horde-Core/twinms-releases --limit 100 --json tagName | ConvertFrom-Json
            $vers = $rels.tagName |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              ForEach-Object { [version]($_.TrimStart('v')) } |
              Sort-Object -Descending
            if ($vers) {
              $l = @($vers)[0]
              $ver = "{0}.{1}.{2}" -f $l.Major, $l.Minor, ($l.Build + 1)
            } else {
              $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
            }
          }
          Write-Host "Publishing version: $ver"
          npm version $ver --no-git-tag-version --allow-same-version

      - name: Assemble stack (stage prebuilt backend + snapshot into vendor/)
        shell: pwsh
        env:
          TWINMS_BACKEND_DIR: ${{ github.workspace }}\_backend
          TWINMS_SEED_DIR: ${{ github.workspace }}\_snapshot
        run: node scripts/assemble-stack.js

      # Embed the CLIENT update token so the installed app can read this PRIVATE feed.
      # This is a SEPARATE, read-only PAT (Contents: read on twinms-releases only) — NOT
      # the orchestrator token. It's written into electron/update-token.js (gitignored)
      # right before packaging, so it ships inside the app but never lives in source.
      - name: Inject read-only update token (embedded in the app)
        shell: pwsh
        env:
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        run: |
          if (-not $env:UPDATE_TOKEN) {
            throw "UPDATE_TOKEN secret is missing. Create a fine-grained PAT with Contents: read on Horde-Core/twinms-releases and add it as the UPDATE_TOKEN secret."
          }
          Set-Content -NoNewline -Path electron/update-token.js -Value "module.exports = '$($env:UPDATE_TOKEN)';"
          Write-Host "Wrote electron/update-token.js (read-only client update token embedded)"

      - name: Build + publish installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Show output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host ("{0}  ({1:N0} MB)" -f $_.Name, ($_.Length / 1MB)) }
